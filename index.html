<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CLONDOUR Health Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="dashboard">
        <h1>Health Dashboard</h1>

        <div class="panel">
            <input type="number" id="userAge" placeholder="Your Age">
            <input type="text" id="foodInput" placeholder="Food Name">
            <button id="saveBtn">Analyze & Save</button>
            <div id="resultArea" class="hidden">
                <p id="analysisText"></p>
                <ul id="dietList"></ul>
            </div>
        </div>

        <div class="panel">
            <h3>Progress Tracker</h3>
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-fill"></div>
            </div>
            <p id="progressText">0g / 50g</p>

            <h3>AI Assistant</h3>
            <div id="chatDisplay" class="chat-area"></div>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="text" id="chatInput" placeholder="Ask AI...">
                <button id="sendChat" style="width:auto">Send</button>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>

</html>
