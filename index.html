<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriScan Pro | Health Monitoring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="glass-container">
        <header>
            <h1 id="ui-header">NutriScan Pro</h1>
            <select id="langBtn">
                <option value="en">English</option>
                <option value="tl">Tagalog</option>
            </select>
        </header>

        <section class="input-section">
            <div class="field">
                <label id="ui-age-label">User Age</label>
                <input type="number" id="userAge" placeholder="21">
            </div>

            <div class="field">
                <label id="ui-food-label">Food Item</label>
                <input type="text" id="foodInput" placeholder="e.g., Avocado">
            </div>

            <button id="saveBtn">Analyze Growth</button>
        </section>

        <div id="resultArea" class="hidden">
            <div class="result-card">
                <p id="analysisText"></p>
            </div>
        </div>

        <section class="history-section">
            <h2 id="ui-history">Live Activity</h2>
            <div id="logList"></div>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
