<div class="dashboard-grid">
    <div class="stat-card">
        <h3 id="ui-progress-title">Daily Goal</h3>
        <div class="progress-bar-bg">
            <div id="progressBar" class="progress-bar-fill" style="width: 0%"></div>
        </div>
        <p id="progressText">0 / 50g Protein</p>
    </div>

    <div class="stat-card">
        <h3>Pro Diet List</h3>
        <ul id="dietList" class="scroll-list">
        </ul>
    </div>
</div>

<div class="chat-box">
    <div id="chatDisplay" class="chat-display">
        <p class="bot-msg">Hello! Ask me about your diet.</p>
    </div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="How to gain muscle?">
        <button id="sendChat">Send</button>
    </div>
</div>
